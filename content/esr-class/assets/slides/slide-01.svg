  <text x="140" y="150" fill="#1f7a8c" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">SLIDE 1</text>
  <text x="140" y="245" fill="#12355b" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="700">ESR Class</text>
<text x="140" y="327" fill="#12355b" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="700">Intro</text>
  <line x1="140" y1="395" x2="700" y2="395" stroke="#1f7a8c" stroke-width="10" stroke-linecap="round"/>
  <text x="140" y="465" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">This training introduces leaders and</text>
<text x="140" y="505" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">maintenance personnel to the Equipment</text>
<text x="140" y="545" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">Status Report, or ESR, as a practical tool</text>
<text x="140" y="585" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">for reading, understanding, and acting on</text>
  <rect x="900" y="250" width="170" height="300" rx="42" fill="#d9e8f6"/>
