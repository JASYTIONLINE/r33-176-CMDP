<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Slide 1: Intro</title>
  <desc id="desc">Presentation image for Intro.</desc>
  <rect width="1280" height="720" fill="#12355b"/>
  <circle cx="1080" cy="145" r="175" fill="#1f7a8c" opacity="0.28"/>
  <circle cx="170" cy="610" r="220" fill="#d9e8f6" opacity="0.32"/>
