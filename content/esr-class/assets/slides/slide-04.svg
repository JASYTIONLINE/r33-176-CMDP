  <text x="140" y="150" fill="#1f7a8c" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">SLIDE 4</text>
  <text x="140" y="245" fill="#12355b" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="700">What Does</text>
<text x="140" y="327" fill="#12355b" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="700">the ESR Do?</text>
  <line x1="140" y1="395" x2="700" y2="395" stroke="#1f7a8c" stroke-width="10" stroke-linecap="round"/>
  <text x="140" y="465" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">The Equipment Status Report provides a</text>
<text x="140" y="505" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">snapshot of equipment readiness in the</text>
<text x="140" y="545" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">unit by consolidating faults, work order</text>
<text x="140" y="585" fill="#607083" font-family="Arial, Helvetica, sans-serif" font-size="28">status, and operational condition into one</text>
